services:
  frontend:
    build: ./frontend_sio
    ports:
      - "3000:80"
    depends_on:
      - backend

  backend:
    build: ./sio_backend
    ports:
      - "8081:80"
    environment:
      DB_HOST: db
      DB_USER: root
      DB_PASS: rootpassword
      DB_NAME: backend
    depends_on:
      - db

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: backend
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
